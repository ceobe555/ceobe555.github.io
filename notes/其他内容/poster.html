<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        .clearfix:after {
            visibility: hidden;
            clear: both;
            display: block;
            content: ".";
            height: 0;
        }
        .clearfix {
            *zoom: 1;
        }
        .poster {
            position: relative;
            margin: 30px auto;
            width: 500px;
            height: 890px;
            background: url(../../images/materials/xibao.png);
            text-align: center;
        }
        .poster .happy {
            position: absolute;
            top: 400px;
            left: 75px;
            background-color: #fff;
            width: 350px;
            height: 70px;
            line-height: 70px;
            margin: 0 auto;
        }
        .poster .left {
            position: absolute;
            top: 400px;
            left: 75px;
            width: 0;
            height: 0;
            border-color: transparent;
            border-left-color: #e30a0f;
            border-style: solid;
            border-width: 35px 35px 35px 35px;
            color: #e30a0f;
            z-index: 2;
        }
        .poster .right {
            position: absolute;
            top: 400px;
            right: 75px;
            width: 0;
            height: 0;
            border-color: transparent;
            border-right-color: #e30a0f;
            border-style: solid;
            border-width: 35px 35px 35px 35px;
            color: #e30a0f;
            z-index: 2;
        }
        .poster .happy p {
            font-size: 30px;
            color: #e30a0f;
            z-index: 1;
        }
        .poster .message {
            position: absolute;
            top: 500px;
            left: 25px;
            width: 450px;
            height: 100px;
            line-height: 100px;
            margin: 0 auto;
            font-size: 50px;
            color: #fff;
            text-shadow: 3px 4px 3px rgba(0, 0, 0, .3);
        }
    </style>
</head>
<body>
    <div class="poster">
        <div class="left"></div>
        <div class="happy">
            <p>——热烈庆祝——</p>
        </div>
        <div class="right"></div>
        <div class="message">
            XXX连续加班25小时，获得奖金123456元
        </div>
    </div>
</body>
</html>
