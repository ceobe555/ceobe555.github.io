<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            position: relative;
            width: 400px;
            border-bottom: 1px solid #ccc;
            margin: 100px auto;
        }
        .box input {
            width: 370px;
            height: 30px;
            border: 0;
            outline: none;
            color: #999;
        }
        .box img {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 24px;
        }
        /*密码验证框部分*/
        div {
            width: 600px;
            margin: 150px auto;
        }
        .message {
            display: inline-block;
            font-size: 12px;
            color: #999;
            padding-left: 20px;
        }
        .wrong {
            color: red;
        }
        .right {
            color: green;
        }
    </style>
</head>
<body>
    <div class="box">
        <label for="">
            <img src="../../images/icon/search1.jpg" alt="" id="eye">
        </label>
        <input type="password" value="961205" id="pwd">
    </div>
    <script>
        var eye = document.getElementById('eye');
        var pwd = document.getElementById('pwd');
        var flag = 0;
        eye.onclick = function() {
            if (flag == 0) {
                pwd.type = 'text';
                this.src = '../../images/icon/user.jpg';
                flag = 1;
            } else {
                pwd.type = 'password';
                this.src = '../../images/icon/search1.jpg';
                flag = 0;
            }
        }
        var text = document.querySelector('input');
        text.onfocus = function() {
            if (this.value === '961205') {
                this.value = '';
            }
            this.style.color = '#333';
        }
        text.onblur = function() {
            if (this.value === '') {
                this.value = '961205';
            }
            this.style.color = '#999';
        }
    </script>
    <div class="register">
        <input type="password" class="ipt">
        <p class="message">请输入6-16位密码</p>
    </div>
    <script>
        var ipt = document.querySelector('.ipt');
        var message = document.querySelector('.message');
        ipt.onblur = function() {
            if (this.value.length < 6 || this.value.length > 16) {
                message.className = 'message wrong';
                message.innerHTML = '输入的位数不满足要求'
            } else {
                message.className = 'message right';
                message.innerHTML = '输入符合要求';
            }
        }
    </script>
</body>
</html>
