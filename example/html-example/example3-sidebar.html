<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        a {
            width: 200px;
            height: 40px;
            background-color: #55585a;
            text-decoration: none;
            text-indent: 2em;
            font-size: 14px;
            color: #fff;
            line-height: 40px; /*让文字的行高等于盒子的高度实现文字的垂直居中*/
            padding-left: 30px;
            display: block;
        }
        a:hover {
            background-color: #ff6700;
        }
    </style>
</head>
<body>
    <a href="#">手机</a>
    <a href="#">电脑</a>
    <a href="#">笔记本</a>
    <a href="#">耳机</a>
</body>
</html>
