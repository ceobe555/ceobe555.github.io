    <title>Document</title>
    <style>
        /* 字体声明  */
        @font-face {
            font-family: 'icomoon';
            src:  url('fonts/icomoon.eot?w18uls');
            src:  url('fonts/icomoon.eot?w18uls#iefix') format('embedded-opentype'),
                url('fonts/icomoon.ttf?w18uls') format('truetype'),
                url('fonts/icomoon.woff?w18uls') format('woff'),

            font-style: normal;

        span {
            font-family: 'icomoon';

        div {
            position: relative;
        }
        div::after {
            position: absolute;
            top: 10px;
