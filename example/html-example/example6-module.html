<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #f5f5f5;
            
        }
        a {
            color: #333;
            text-decoration: none;
        }
        li {
            list-style: none;
        }
        .box {
            width: 298px;
            height: 400px;
            background-color: #fff;
            margin: 100px auto;
        }
        .box img {
            width: 100%;
        }
        .review {
            height: 70px;
            font-size: 14px;
            padding: 0 28px; /*因为段落没有width属性，所以padding不会撑开盒子宽度*/
            margin-top: 30px;
        }
        .appraise {
            font-size: 11px;
            color: #b0b0b0;
            margin-top: 20px;
            padding: 0 28px;
        }
        .info {
            font-size: 14px;
            margin-top: 15px;
            padding: 0 28px;
        }
        .info h4 {
            display: inline-block;
            font-weight: 400;
        }
        .info span {
            color: #ff6700;
        }
        .info em {
            font-style: normal;
            color: #ebe4e0;
            margin: 0 6px 0 20px;
        }
        .box2 {
            width: 248px;
            height: 163px;
            border: 1px solid #ccc;
            margin: 100px auto;
        }
        .box2 h3 {
            height: 32px;
            border-bottom: 1px dotted #ccc;
            font-size: 14px;
            font-weight: 400;
            line-height: 32px;
            padding-left: 15px;
        }
        .box2 ul li a {
            font-size: 12px;
            color: #666;
            text-decoration: none;
        }
        .box2 ul li {
            height: 23px;
            line-height: 23px;
            padding-left: 20px;
        }
        .box2 ul {
            margin-top: 7px;
        }
        .box2 ul li a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="box">
        <img src="images/background/ling.jpg" alt="">
        <p class="review">线性代数基础内容学习，包括行列式，线性方程组，线性变换，线性空间</p>
        <div class="appraise">
            来自于秋初的评价
        </div>
        <div class="info">
            <h4><a href="#">线性代数</a></h4>
            <em>|</em>
            <span>30days</span>
        </div>
    </div>
    <!-- 快报模块 -->
    <div class="box2">
        <h3>
            线性代数
        </h3>
        <ul>
            <li><a href="#">【1】行列式</a></li>
            <li><a href="#">【2】线性方程组</a></li>
            <li><a href="#">【3】线性变换</a></li>
        </ul>
    </div>
</body>
</html>
